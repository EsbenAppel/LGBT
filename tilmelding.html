<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilmeldelse</title>
  <link rel="stylesheet" href="vaermed_style.css">
</head>
<body>
  <div class="page-shell">
    <header class="header">
      <div class="burger" id="burger" aria-label="Åbn menu" aria-expanded="false" aria-controls="sidebar" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="LGBT">
        <h1>LGBT+</h1>
      </div>

      <div class="logo">
        <a href="index.html">
          <img src="lgbtbilleder/projekt_4_logoer.png" alt="vores logo">
        </a>
      </div>
    </header>

    <nav class="sidebar" id="sidebar">
      <a href="Om os.html">Om os</a>
      <a href="vaermed.html">Vær med</a>
      <a href="aktiviteter.html">Aktiviteter</a>
      <a href="#">Viden</a>
      <a href="#">Politik</a>
    </nav>

    <div class="overlay" id="overlay"></div>

    <main>
      <section class="hero">
        <h2>Tilmeldelse</h2>
        <div class="section-line"></div>
      </section>

      <div class="section-divider"></div>

      <section class="tilmelding-content">
        <div class="form-wrap">
          <a href="vaermed.html" class="back-arrow" aria-label="Gå tilbage">←</a>

          <form class="signup-form" id="signupForm">
            <label for="fornavn">Fornavn</label>
            <input type="text" id="fornavn" name="fornavn" required>

            <label for="efternavn">Efternavn</label>
            <input type="text" id="efternavn" name="efternavn" required>

            <label for="telefon">Tlf nummer</label>
            <input type="tel" id="telefon" name="telefon">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="by">By</label>
            <input type="text" id="by" name="by">

            <label for="interesse">Hvordan vil du gerne hjælpe?</label>
            <input type="text" id="interesse" name="interesse">

            <div class="newsletter-wrap">
              <input type="checkbox" id="nyhedsbrev" name="nyhedsbrev">
              <label for="nyhedsbrev">Tilmeld dig vores nyhedsbrev</label>
            </div>

            <button type="submit" class="signup-btn">TILMELD</button>
            <p class="form-message" id="formMessage" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div>
          <div class="footer-text">
            <p>LGBT+ Danmark,</p>
            <p>landsforeningen for</p>
            <p>bøsser, lesbiske,</p>
            <p>biseksuelle og</p>
            <p>transpersoner</p>
          </div>

          <div class="footer-contact">
            <p>Vestergade 18E, 2. sal</p>
            <p>1456 København K</p>
            <p>CVR 23072513</p>
            <p>lgbt@lgbt.dk</p>
          </div>
        </div>

        <div class="footer-socials">
          <a href="#" aria-label="Instagram">
            <img src="lgbtbilleder/instagram.png" alt="Instagram">
          </a>
          <a href="#" aria-label="Facebook">
            <img src="lgbtbilleder/facebook.png" alt="Facebook">
          </a>
          <a href="#" aria-label="TikTok">
            <img src="lgbtbilleder/tiktok.png" alt="TikTok">
          </a>
        </div>
      </div>
    </footer>
  </div>

  <script src="vaermed.js"></script>
</body>
</html>
